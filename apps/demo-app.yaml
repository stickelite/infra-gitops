apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/stickelite/infra-gitops
    targetRevision: main
    path: charts/demo-app
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-app
  syncPolicy: 
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true