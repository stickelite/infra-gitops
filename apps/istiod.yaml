apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: istiod
      targetRevision: "1.24.*"
      helm:
        releaseName: istiod
        valueFiles:
          - $values/charts/istio/istiod/values.yaml
    - repoURL: https://github.com/stickelite/infra-gitops
      targetRevision: main
      ref: values
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jsonPointers:
        - /webhooks/0/failurePolicy
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: istio-sidecar-injector
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
        - /webhooks/1/clientConfig/caBundle
    - group: apps
      kind: Deployment
      name: istiod
      jsonPointers:
        - /spec/template/spec/volumes/0/downwardAPI/items/0/resourceFieldRef/divisor
        - /spec/template/spec/volumes/0/downwardAPI/items/1/resourceFieldRef/divisor
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

